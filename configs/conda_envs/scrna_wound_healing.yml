# scRNA-seq Wound Healing Analysis Environment
# Project: Tissue Fluidity Controls Skin Repair (Sarate Lab)
# Usage: conda env create -f configs/conda_envs/scrna_wound_healing.yml
# Activate: conda activate scrna_wound

name: scrna_wound
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python core
  - python=3.11
  - pip

  # Data science
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3

  # scRNA-seq analysis
  - scanpy>=1.9
  - anndata>=0.10
  - leidenalg
  - igraph
  - louvain

  # Visualization
  - matplotlib>=3.7
  - seaborn>=0.12

  # File formats
  - h5py
  - pytables

  # Jupyter
  - jupyterlab
  - ipykernel

  # Bioinformatics CLI tools
  - samtools>=1.17
  - fastqc
  - multiqc
  - sra-tools

  # pip-only packages
  - pip:
    - scrublet
    - scvelo>=0.3
    - cellrank>=2.0
    - gseapy>=1.0
    - decoupler>=1.5
    - pyscenic>=0.12
    - harmonypy
    - bbknn
