name: Lint Python & R

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  lint-python:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 scripts/python/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --exclude=__pycache__,.venv

  lint-r:
    name: Lint R (lintr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.0"

      - name: Install lintr
        run: Rscript -e "install.packages('lintr', repos='https://cran.r-project.org/')"

      - name: Run lintr on R scripts
        run: |
          Rscript -e "
            library(lintr)
            files <- list.files('scripts/R', pattern='\\\\.R$', full.names=TRUE, recursive=TRUE)
            lints <- lint_package(path='scripts/R')
            if (length(lints) > 0) { print(lints); quit(status=1) }
          "
